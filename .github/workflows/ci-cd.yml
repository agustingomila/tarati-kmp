name: CI/CD Pipeline - Android + Desktop

on:
  push:
    branches: [ master, develop ]
    paths-ignore:
      - 'README*.md'
      - '**.md'
      - 'docs/**'
      - 'screenshots/**'
      - 'achievements/**'
      - '.gitignore'
  pull_request:
    branches: [ master ]
    paths-ignore:
      - 'README*.md'
      - '**.md'
      - 'docs/**'
      - 'screenshots/**'
      - 'achievements/**'
      - '.gitignore'
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  actions: write
  packages: write

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # Limpieza automática de workflows antiguos
  # ═══════════════════════════════════════════════════════════════════════════
  delete-old-workflow-runs:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: yanovation/delete-old-actions@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          days-ago: 30

  # ═══════════════════════════════════════════════════════════════════════════
  # Generación Automática de Iconos
  # ═══════════════════════════════════════════════════════════════════════════
  generate-icons:
    name: Generate Icons
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick icnsutils optipng

      - name: Generate all icons
        run: |
          SOURCE="screenshots/logo.big.1024.png"
          
          if [ ! -f "$SOURCE" ]; then
            echo "❌ Error: Source image not found: $SOURCE"
            exit 1
          fi
          
          echo "🎨 Source: $SOURCE"
          
          # ── Función: Forzar dimensiones cuadradas ─────────────────────────
          resize_square() {
            local input="$1"
            local output="$2"
            local size="$3"
          
            convert "$input" \
              -resize "${size}x${size}" \
              -gravity center \
              -background none \
              -extent "${size}x${size}" \
              "$output"
          }
          
          # ══════════════════════════════════════════════════════════════════
          # ANDROID
          # ══════════════════════════════════════════════════════════════════
          
          echo ""
          echo "🤖 Generating Android icons..."
          
          ANDROID_DIR="androidApp/src/main/res"
          
          resize_square "$SOURCE" "$ANDROID_DIR/mipmap-mdpi/ic_launcher.png" 48
          resize_square "$SOURCE" "$ANDROID_DIR/mipmap-mdpi/ic_launcher_round.png" 48
          resize_square "$SOURCE" "$ANDROID_DIR/mipmap-hdpi/ic_launcher.png" 72
          resize_square "$SOURCE" "$ANDROID_DIR/mipmap-hdpi/ic_launcher_round.png" 72
          resize_square "$SOURCE" "$ANDROID_DIR/mipmap-xhdpi/ic_launcher.png" 96
          resize_square "$SOURCE" "$ANDROID_DIR/mipmap-xhdpi/ic_launcher_round.png" 96
          resize_square "$SOURCE" "$ANDROID_DIR/mipmap-xxhdpi/ic_launcher.png" 144
          resize_square "$SOURCE" "$ANDROID_DIR/mipmap-xxhdpi/ic_launcher_round.png" 144
          resize_square "$SOURCE" "$ANDROID_DIR/mipmap-xxxhdpi/ic_launcher.png" 192
          resize_square "$SOURCE" "$ANDROID_DIR/mipmap-xxxhdpi/ic_launcher_round.png" 192
          resize_square "$SOURCE" "$ANDROID_DIR/mipmap-mdpi/ic_launcher_foreground.png" 108
          resize_square "$SOURCE" "$ANDROID_DIR/mipmap-hdpi/ic_launcher_foreground.png" 162
          resize_square "$SOURCE" "$ANDROID_DIR/mipmap-xhdpi/ic_launcher_foreground.png" 216
          resize_square "$SOURCE" "$ANDROID_DIR/mipmap-xxhdpi/ic_launcher_foreground.png" 324
          resize_square "$SOURCE" "$ANDROID_DIR/mipmap-xxxhdpi/ic_launcher_foreground.png" 432
          
          echo "✅ Android icons generated"
          
          # ══════════════════════════════════════════════════════════════════
          # DESKTOP
          # ══════════════════════════════════════════════════════════════════
          
          echo ""
          echo "💻 Generating Desktop icons..."
          
          DESKTOP_DIR="desktopApp/src/jvmMain/resources"
          mkdir -p "$DESKTOP_DIR"
          
          # ── Windows .ico ──────────────────────────────────────────────────
          echo "  🪟 Generating Windows .ico..."
          
          ICO_DIR=$(mktemp -d)
          resize_square "$SOURCE" "$ICO_DIR/16.png" 16
          resize_square "$SOURCE" "$ICO_DIR/32.png" 32
          resize_square "$SOURCE" "$ICO_DIR/48.png" 48
          resize_square "$SOURCE" "$ICO_DIR/64.png" 64
          resize_square "$SOURCE" "$ICO_DIR/128.png" 128
          resize_square "$SOURCE" "$ICO_DIR/256.png" 256
          
          convert "$ICO_DIR"/*.png "$DESKTOP_DIR/icon.ico"
          rm -rf "$ICO_DIR"
          
          # ── macOS .icns ───────────────────────────────────────────────────
          echo "  🍎 Generating macOS .icns..."
          
          ICONSET_DIR=$(mktemp -d)/AppIcon.iconset
          mkdir -p "$ICONSET_DIR"
          
          # Generar SOLO tamaños @2x (Retina) sin duplicados
          # Cada tamaño @2x cubre el tamaño base correspondiente
          resize_square "$SOURCE" "$ICONSET_DIR/icon_16x16@2x.png" 32
          resize_square "$SOURCE" "$ICONSET_DIR/icon_32x32@2x.png" 64
          resize_square "$SOURCE" "$ICONSET_DIR/icon_128x128@2x.png" 256
          resize_square "$SOURCE" "$ICONSET_DIR/icon_256x256@2x.png" 512
          resize_square "$SOURCE" "$ICONSET_DIR/icon_512x512@2x.png" 1024
          
          png2icns "$DESKTOP_DIR/icon.icns" "$ICONSET_DIR"/*.png
          echo "  ✅ macOS .icns created"
          
          rm -rf "$ICONSET_DIR"
          
          # ── Linux PNGs ────────────────────────────────────────────────────
          echo "  🐧 Generating Linux PNGs..."
          
          resize_square "$SOURCE" "$DESKTOP_DIR/icon-16.png" 16
          resize_square "$SOURCE" "$DESKTOP_DIR/icon-32.png" 32
          resize_square "$SOURCE" "$DESKTOP_DIR/icon-48.png" 48
          resize_square "$SOURCE" "$DESKTOP_DIR/icon-64.png" 64
          resize_square "$SOURCE" "$DESKTOP_DIR/icon-128.png" 128
          resize_square "$SOURCE" "$DESKTOP_DIR/icon-256.png" 256
          resize_square "$SOURCE" "$DESKTOP_DIR/icon-512.png" 512
          
          echo "✅ Desktop icons generated"
          
          # ══════════════════════════════════════════════════════════════════
          # WEB (PWA)
          # ══════════════════════════════════════════════════════════════════
          
          echo ""
          echo "🌐 Generating Web/PWA icons..."
          
          WEB_DIR="web/public"
          mkdir -p "$WEB_DIR"
          
          resize_square "$SOURCE" "$WEB_DIR/favicon.ico" 32
          resize_square "$SOURCE" "$WEB_DIR/icon-192.png" 192
          resize_square "$SOURCE" "$WEB_DIR/icon-512.png" 512
          resize_square "$SOURCE" "$WEB_DIR/apple-touch-icon.png" 180
          
          echo "✅ Web/PWA icons generated"
          
          # ══════════════════════════════════════════════════════════════════
          # iOS
          # ══════════════════════════════════════════════════════════════════
          
          echo ""
          echo "📱 Generating iOS icons..."
          
          IOS_DIR="iosApp/Assets.xcassets/AppIcon.appiconset"
          mkdir -p "$IOS_DIR"
          
          resize_square "$SOURCE" "$IOS_DIR/icon-20@2x.png" 40
          resize_square "$SOURCE" "$IOS_DIR/icon-20@3x.png" 60
          resize_square "$SOURCE" "$IOS_DIR/icon-29@2x.png" 58
          resize_square "$SOURCE" "$IOS_DIR/icon-29@3x.png" 87
          resize_square "$SOURCE" "$IOS_DIR/icon-40@2x.png" 80
          resize_square "$SOURCE" "$IOS_DIR/icon-40@3x.png" 120
          resize_square "$SOURCE" "$IOS_DIR/icon-60@2x.png" 120
          resize_square "$SOURCE" "$IOS_DIR/icon-60@3x.png" 180
          resize_square "$SOURCE" "$IOS_DIR/icon-76.png" 76
          resize_square "$SOURCE" "$IOS_DIR/icon-76@2x.png" 152
          resize_square "$SOURCE" "$IOS_DIR/icon-83.5@2x.png" 167
          resize_square "$SOURCE" "$IOS_DIR/icon-1024.png" 1024
          
          echo "✅ iOS icons generated"
          
          # ══════════════════════════════════════════════════════════════════
          # OPTIMIZACIÓN
          # ══════════════════════════════════════════════════════════════════
          
          echo ""
          echo "🔧 Optimizing PNGs..."
          
          find . \( \
            -path "*/mipmap-*/*.png" -o \
            -path "*/desktopApp/src/jvmMain/resources/*.png" -o \
            -path "*/web/public/*.png" -o \
            -path "*/Assets.xcassets/AppIcon.appiconset/*.png" \
          \) -type f -exec optipng -quiet -o2 {} \;
          
          echo "✅ PNGs optimized"
          
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "✨ Icon generation complete!"
          echo ""
          echo "  🤖 Android: 15 icons"
          echo "  💻 Desktop: .ico, .icns, 7 PNGs"
          echo "  🌐 Web: favicon, 2 PWA icons, Apple Touch"
          echo "  📱 iOS: 13 icons"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      - name: Commit generated icons
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add androidApp/src/main/res/mipmap-*/*.png \
                 desktopApp/src/jvmMain/resources/*.{ico,icns,png} \
                 web/public/*.{ico,png} \
                 iosApp/Assets.xcassets/AppIcon.appiconset/*.png || true
          git commit -m "ci: Auto-generate icons from logo.big.1024.png [skip ci]" || echo "No changes to commit"
          git push

  # ═══════════════════════════════════════════════════════════════════════════
  # Tests
  # ═══════════════════════════════════════════════════════════════════════════
  test:
    runs-on: ubuntu-latest
    needs: generate-icons

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-read-only: false

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run tests
        run: |
          if [ "${{ github.ref }}" == "refs/heads/master" ]; then
            ./gradlew :androidApp:test --info -PreleaseBuild=true
          else
            ./gradlew :androidApp:test --info
          fi
        continue-on-error: true

  # ═══════════════════════════════════════════════════════════════════════════
  # Build Android
  # ═══════════════════════════════════════════════════════════════════════════
  build-android:
    runs-on: ubuntu-latest
    needs: test
    if: >-
      (
        github.event_name == 'workflow_dispatch'
      ) || (
        github.ref == 'refs/heads/master' &&
        !contains(github.event.head_commit.message, '[skip release]') &&
        !contains(github.event.head_commit.message, '[no release]') &&
        !startsWith(github.event.head_commit.message, 'ci: Bump versionCode')
      )

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-read-only: false

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # ═══════════════════════════════════════════════════════════
      # Leer versión
      # ═══════════════════════════════════════════════════════════
      - name: Read version
        id: version
        run: |
          if [ ! -f version.properties ]; then
            echo "versionCode=1" > version.properties
            echo "versionName=1.0.0" >> version.properties
          fi

          VERSION_CODE=$(grep 'versionCode' version.properties | cut -d'=' -f2 | tr -d '[:space:]')
          VERSION_NAME=$(grep 'versionName' version.properties | cut -d'=' -f2 | tr -d '[:space:]"')

          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
          
          echo "📱 Building Android v$VERSION_NAME (build $VERSION_CODE)"

      # ═══════════════════════════════════════════════════════════
      # Decodificar keystore
      # ═══════════════════════════════════════════════════════════
      - name: Setup Keystore
        run: |
          mkdir -p androidApp
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > androidApp/keystore.jks
          echo "✅ Keystore decoded to androidApp/keystore.jks"

      # ═══════════════════════════════════════════════════════════
      # Build Android APK y AAB
      # ═══════════════════════════════════════════════════════════
      - name: Build Android Release
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew :androidApp:assembleRelease :androidApp:bundleRelease \
            -PversionCode=${{ steps.version.outputs.version_code }} \
            -PversionName=${{ steps.version.outputs.version_name }} \
            -PreleaseBuild=true \
            --stacktrace

      # ═══════════════════════════════════════════════════════════
      # Verificar firma del AAB
      # ═══════════════════════════════════════════════════════════
      - name: Verify AAB signature
        run: |
          # Buscar el AAB generado (puede ser androidApp-release.aab o app-release.aab)
          AAB_FILE=$(find androidApp/build/outputs/bundle/release -name "*.aab" | head -1)
          
          if [ -z "$AAB_FILE" ]; then
            echo "❌ No se encontró archivo AAB"
            ls -R androidApp/build/outputs/bundle/release || echo "Directorio no existe"
            exit 1
          fi
          
          echo "✅ AAB encontrado: $AAB_FILE"
          jarsigner -verify -verbose "$AAB_FILE"
          echo "✅ AAB signature verified"

      # ═══════════════════════════════════════════════════════════
      # Upload Android artifacts
      # ═══════════════════════════════════════════════════════════
      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-v${{ steps.version.outputs.version_name }}
          path: |
            androidApp/build/outputs/apk/release/*.apk
            androidApp/build/outputs/bundle/release/*.aab
            androidApp/build/outputs/native-debug-symbols/**/*.zip
          retention-days: 90

      # ═══════════════════════════════════════════════════════════
      # Limpiar keystore
      # ═══════════════════════════════════════════════════════════
      - name: Cleanup keystore
        if: always()
        run: rm -f androidApp/keystore.jks

  # ═══════════════════════════════════════════════════════════════════════════
  # Build Desktop (Linux, macOS, Windows)
  # ═══════════════════════════════════════════════════════════════════════════
  build-desktop:
    needs: test
    if: >-
      (
        github.event_name == 'workflow_dispatch'
      ) || (
        github.ref == 'refs/heads/master' &&
        !contains(github.event.head_commit.message, '[skip release]') &&
        !contains(github.event.head_commit.message, '[no release]') &&
        !startsWith(github.event.head_commit.message, 'ci: Bump versionCode')
      )

    strategy:
      matrix:
        os: [ ubuntu-latest, macos-latest, windows-latest ]
        include:
          - os: ubuntu-latest
            platform: linux
            task: packageDeb
            artifact_pattern: "desktopApp/build/compose/binaries/main/deb/*.deb"
          - os: macos-latest
            platform: macos
            task: packageDmg
            artifact_pattern: "desktopApp/build/compose/binaries/main/dmg/*.dmg"
          - os: windows-latest
            platform: windows
            task: packageMsi
            artifact_pattern: "desktopApp/build/compose/binaries/main/msi/*.msi"

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-read-only: false

      - name: Grant execute permission for gradlew
        shell: bash
        run: chmod +x gradlew

      # ═══════════════════════════════════════════════════════════
      # Leer versión
      # ═══════════════════════════════════════════════════════════
      - name: Read version
        id: version
        shell: bash
        run: |
          if [ ! -f version.properties ]; then
            echo "versionCode=1" > version.properties
            echo "versionName=1.0.0" >> version.properties
          fi
          
          VERSION_CODE=$(grep 'versionCode' version.properties | cut -d'=' -f2 | tr -d '[:space:]')
          VERSION_NAME=$(grep 'versionName' version.properties | cut -d'=' -f2 | tr -d '[:space:]"')
          
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
          
          echo "💻 Building Desktop (${{ matrix.platform }}) v$VERSION_NAME"

      # ═══════════════════════════════════════════════════════════
      # Build Desktop package
      # ═══════════════════════════════════════════════════════════
      - name: Build Desktop package (${{ matrix.platform }})
        shell: bash
        run: |
          ./gradlew :desktopApp:${{ matrix.task }} \
            -PversionCode=${{ steps.version.outputs.version_code }} \
            -PversionName=${{ steps.version.outputs.version_name }} \
            -PreleaseBuild=true \
            --stacktrace

      # ═══════════════════════════════════════════════════════════
      # Verificar que se generó
      # ═══════════════════════════════════════════════════════════
      - name: Verify installer exists
        shell: bash
        run: |
          if ls ${{ matrix.artifact_pattern }} 1> /dev/null 2>&1; then
            echo "✅ Installer generated successfully"
            ls -lh ${{ matrix.artifact_pattern }}
          else
            echo "❌ Installer not found"
            exit 1
          fi

      # ═══════════════════════════════════════════════════════════
      # Upload Desktop artifacts
      # ═══════════════════════════════════════════════════════════
      - name: Upload Desktop artifacts (${{ matrix.platform }})
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.platform }}-v${{ steps.version.outputs.version_name }}
          path: ${{ matrix.artifact_pattern }}
          retention-days: 90

  # ═══════════════════════════════════════════════════════════════════════════
  # Crear Release con TODOS los artifacts
  # ═══════════════════════════════════════════════════════════════════════════
  create-release:
    runs-on: ubuntu-latest
    needs: [ build-android, build-desktop ]
    if: >-
      (
        github.event_name == 'workflow_dispatch'
      ) || (
        github.ref == 'refs/heads/master' &&
        !contains(github.event.head_commit.message, '[skip release]') &&
        !contains(github.event.head_commit.message, '[no release]') &&
        !startsWith(github.event.head_commit.message, 'ci: Bump versionCode')
      )

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # ═══════════════════════════════════════════════════════════
      # Leer versión
      # ═══════════════════════════════════════════════════════════
      - name: Read version
        id: version
        run: |
          if [ ! -f version.properties ]; then
            echo "versionCode=1" > version.properties
            echo "versionName=1.0.0" >> version.properties
          fi
          
          VERSION_CODE=$(grep 'versionCode' version.properties | cut -d'=' -f2 | tr -d '[:space:]')
          VERSION_NAME=$(grep 'versionName' version.properties | cut -d'=' -f2 | tr -d '[:space:]"')
          
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
          
          echo "🎉 Creating release v$VERSION_NAME (build $VERSION_CODE)"

      # ═══════════════════════════════════════════════════════════
      # Download TODOS los artifacts
      # ═══════════════════════════════════════════════════════════
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Display artifact structure
        run: |
          echo "📦 Artifacts structure:"
          ls -R ./artifacts

      # ═══════════════════════════════════════════════════════════
      # Crear GitHub Release
      # ═══════════════════════════════════════════════════════════
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version_name }}-${{ steps.version.outputs.version_code }}
          name: Tarati v${{ steps.version.outputs.version_name }} (Build ${{ steps.version.outputs.version_code }})
          generate_release_notes: true
          draft: false
          prerelease: false
          body: |
            ## 🎮 Tarati v${{ steps.version.outputs.version_name }}
            **Build:** ${{ steps.version.outputs.version_code }}
            **Commit:** ${{ github.sha }}
            
            ### 📦 Plataformas Disponibles
            
            #### 📱 Android (8.0+)
            - **APK**: Instalación directa en dispositivos
            - **AAB**: Para Google Play Store
            
            #### 💻 Desktop
            - **🪟 Windows 10+**: `.msi` installer
            - **🍎 macOS 11+**: `.dmg` installer
            - **🐧 Linux (Debian/Ubuntu)**: `.deb` package
            
            ### 📝 Changelog
            Ver notas de release generadas automáticamente abajo.
            
            ---
            
            ### 🔒 Seguridad
            Todos los builds están firmados y verificados.
          files: |
            ./artifacts/**/*.apk
            ./artifacts/**/*.aab
            ./artifacts/**/*.zip
            ./artifacts/**/*.msi
            ./artifacts/**/*.dmg
            ./artifacts/**/*.deb

      # ═══════════════════════════════════════════════════════════
      # Incrementar versionCode
      # ═══════════════════════════════════════════════════════════
      - name: Bump version
        id: bump
        run: |
          VERSION_CODE=$(grep 'versionCode' version.properties | cut -d'=' -f2 | tr -d '[:space:]')
          VERSION_NAME=$(grep 'versionName' version.properties | cut -d'=' -f2 | tr -d '[:space:]"')
          NEW_VERSION_CODE=$((VERSION_CODE + 1))
          
          echo "versionCode=$NEW_VERSION_CODE" > version.properties
          echo "versionName=$VERSION_NAME" >> version.properties
          
          echo "new_version_code=$NEW_VERSION_CODE" >> $GITHUB_OUTPUT
          echo "⬆️  Bumping version: $VERSION_CODE → $NEW_VERSION_CODE"

      - name: Commit version bump
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add version.properties
          git commit -m "ci: Bump versionCode to ${{ steps.bump.outputs.new_version_code }} [skip ci]"

          # Pull y push con retry
          for i in 1 2 3; do
            echo "📤 Intento $i de 3..."
            if git pull --rebase origin main && git push; then
              echo "✅ Version bump pusheado exitosamente"
              exit 0
            else
              echo "⚠️  Falló, reintentando en 5 segundos..."
              sleep 5
            fi
          done

          echo "❌ No se pudo pushear después de 3 intentos"
          exit 1
        continue-on-error: true

      # ═══════════════════════════════════════════════════════════
      # Limpiar releases antiguos
      # ═══════════════════════════════════════════════════════════
      - name: Delete old releases and tags
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "🗑️  Cleaning up old releases..."
          
          OLD_TAGS=$(gh release list \
            --limit 100 \
            --json tagName,publishedAt \
            | jq -r 'sort_by(.publishedAt) | reverse | .[1:] | .[].tagName')          
          
          if [ -n "$OLD_TAGS" ]; then
            echo "Deleting old releases (keeping 5 most recent):"
            while IFS= read -r tag; do
              echo "  - $tag"
              gh release delete "$tag" --yes --cleanup-tag 2>/dev/null || true
            done <<< "$OLD_TAGS"
          else
            echo "No old releases to delete"
          fi

  # ═══════════════════════════════════════════════════════════════════════════
  # Upload a Google Play Console (opcional)
  # ═══════════════════════════════════════════════════════════════════════════
  upload-play-console:
    runs-on: ubuntu-latest
    needs: [ build-android ]
    if: >-
      github.ref == 'refs/heads/master' &&
      github.event_name != 'pull_request' &&
      github.event_name != 'schedule'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Android artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: android-v*
          path: ./android-artifacts
          merge-multiple: true

      - name: Check if Play Console secret exists
        id: check_secret
        run: |
          if [ -n "${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}" ]; then
            echo "has_secret=true" >> $GITHUB_OUTPUT
          else
            echo "has_secret=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Google Service Account JSON
        if: steps.check_secret.outputs.has_secret == 'true'
        id: google_json
        run: |
          echo '${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}' > google-service-account.json
          echo "json_path=$(pwd)/google-service-account.json" >> $GITHUB_OUTPUT

      - name: Upload AAB to Play Console
        if: steps.check_secret.outputs.has_secret == 'true'
        id: upload_play
        uses: r0adkll/upload-google-play@v1.1.3
        with:
          serviceAccountJson: ${{ steps.google_json.outputs.json_path }}
          packageName: com.agustin.tarati
          releaseFiles: ./android-artifacts/*.aab
          track: internal
          status: completed
        continue-on-error: true

      - name: Upload result
        run: |
          if [ "${{ steps.upload_play.outcome }}" == "success" ]; then
            echo "✅ Successfully uploaded to Google Play Console"
          elif [ "${{ steps.check_secret.outputs.has_secret }}" == "false" ]; then
            echo "ℹ️  Play Console upload skipped (secret not configured)"
          else
            echo "⚠️  Upload failed - AAB available in GitHub Releases"
          fi

      - name: Cleanup
        if: always()
        run: rm -f google-service-account.json