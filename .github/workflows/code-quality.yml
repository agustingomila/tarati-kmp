name: Code Quality

on:
  push:
    branches: [ main, develop ]
    paths-ignore:
      - 'README*.md'
      - '**.md'
      - '**.ps1'
      - '**.txt'
      - 'docs/**'
      - 'screenshots/**'
      - '.gitignore'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - 'README*.md'
      - '**.md'
      - '**.ps1'
      - '**.txt'
      - 'docs/**'
      - 'screenshots/**'
      - '.gitignore'
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 0' # Ejecutar semanalmente

permissions:
  contents: read
  checks: write

jobs:
  code-quality:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ktlint usando el plugin de Gradle
      - name: Run ktlint
        run: |
          ./gradlew ktlintCheck
        continue-on-error: true

      # Detekt - Análisis estático
      - name: Run Detekt
        run: |
          ./gradlew detekt
        continue-on-error: true

      # Subir reportes
      - name: Upload ktlint report
        uses: actions/upload-artifact@v4
        with:
          name: ktlint-report
          path: |
            build/reports/ktlint/
            ktlint-report.*

      - name: Upload Detekt report
        uses: actions/upload-artifact@v4
        with:
          name: detekt-report
          path: app/build/reports/detekt/