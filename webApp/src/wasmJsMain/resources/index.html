<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport">
    <title>Tarati — The Game</title>
    <link href="/favicon.ico" rel="icon" type="image/x-icon">
    <link href="/favicon-16x16.png" rel="icon" sizes="16x16" type="image/png">
    <link href="/favicon-32x32.png" rel="icon" sizes="32x32" type="image/png">
    <link href="/apple-touch-icon.png" rel="apple-touch-icon" sizes="180x180">
    <link href="/manifest.json" rel="manifest">
    <meta content="#1a1a2e" name="theme-color">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #1a1a2e;
        }

        canvas {
            display: block;
        }
    </style>
</head>
<body>
<!-- Override manual de URL del servidor Ktor (escape hatch).
     En dev normal no hace falta: el webpack proxy en :3000 reenvía a Ktor en :8080.
     Descomentar solo para apuntar a un servidor distinto (ej. staging remoto).
<script>globalThis.__TARATI_SERVER__ = "localhost:8080";</script>
-->
<script>
    // Captura el prompt de instalación PWA antes de que el browser lo muestre.
    // __pwaInstall() lo dispara; __pwaCanInstall() indica si está disponible.
    var __pwaPrompt = null;
    window.addEventListener('beforeinstallprompt', function(e) {
        e.preventDefault();
        __pwaPrompt = e;
    });
    window.addEventListener('appinstalled', function() {
        __pwaPrompt = null;
    });
    globalThis.__pwaCanInstall = function() { return __pwaPrompt != null; };
    globalThis.__pwaInstall   = function() {
        if (!__pwaPrompt) return;
        var p = __pwaPrompt;
        __pwaPrompt = null;
        p.prompt();
    };
</script>
<script src="tarati.js"></script>
<script>
    const isDev = location.hostname === 'localhost' || location.hostname === '127.0.0.1';
    if ('serviceWorker' in navigator) {
        if (isDev) {
            // En dev desregistramos cualquier SW previo para que no interfiera con HMR.
            // (Un SW instalado desde producción o antes del guard sirve bundles cacheados
            // con hashes viejos → 404 en .wasm → loop infinito al pulsar F5.)
            navigator.serviceWorker.getRegistrations()
                .then(regs => regs.forEach(r => r.unregister()));
        } else {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .catch(err => console.warn('[SW] Registration failed:', err));
            });
        }
    }
</script>
</body>
</html>
